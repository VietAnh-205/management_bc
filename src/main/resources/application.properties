# order
order.generator.enabled=false
order.generator.interval=60000
order.generator.daily-cron:0 0 1 * * *
order.generator.daily-total:650
order.generator.max-lines=4
order.generator.max-realtime-orders=10
order.generator.realtime-hour-weights=1,1,2,3,4,3,2,3,4,3,2,1,2,3,4,3,2,1,1,3,4,3,1,1
order.generator.enable-rfm:true
order.generator.enable-abandonment:true
order.generator.safety-stock-pct:0.05

order.generator.enable-allocation:true

#product
product.generator.enabled=false
product.generator.interval=600000
product.generator.max-per-run=3
product.generator.sku-base=10000

# batch
replenishment.enabled=false
# scheduled scan: m?c ??nh m?i 30 phút
replenishment.cron=0 0 0 * * *
# lead time, ??n v?: ngŕy
replenishment.lead-time-days=1
# min qty/order, pack size m?c ??nh
replenishment.min-order-qty=30
# s? ngŕy d? tr? mong mu?n sau khi hŕng t?i
replenishment.target-cover-days=14
# safety stock heuristic days
replenishment.safety-stock-days=5
# min average daily demand m?c ??nh
replenishment.min-daily-demand=0
# s? order t?i ?a trong 1 run
replenishment.max-orders-per-run=16
# cap t?i ?a cho 1 order
replenishment.max-order-limit=10000
# activation job interval (miliseconds) ? default 60000 (1 phút)
replenishment.activation-interval-ms=60000



